<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:220px; background:#0a0a0f; color:#e8e8f0; font-family:'Inter',sans-serif; overflow:hidden; }
    .header { padding:16px 16px 12px; border-bottom:1px solid #1e1e2e; display:flex; align-items:center; gap:8px; }
    .logo { width:28px; height:28px; background:linear-gradient(135deg,#6366f1,#818cf8); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .title { font-family:'Space Mono',monospace; font-size:11px; font-weight:700; color:#fff; }
    .sub   { font-size:9px; color:#555577; margin-top:1px; }
    .status-bar { padding:8px 16px; display:flex; align-items:center; gap:6px; background:#0f0f1a; }
    .status-dot { width:6px; height:6px; border-radius:50%; background:#3a3a5c; transition:all .3s; }
    .status-dot.active { background:#4ade80; box-shadow:0 0 8px #4ade80aa; animation:pulse 1.5s infinite; }
    .status-dot.error  { background:#f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .status-text { font-size:11px; color:#6666aa; font-family:'Space Mono',monospace; }
    .status-text.active { color:#4ade80; }
    .status-text.error  { color:#f87171; }
    .actions { padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
    button { width:100%; padding:9px 12px; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:6px; }
    #btnWindow { background:#1a1a2e; color:#8888cc; border:1px solid #2a2a4a; }
    #btnWindow:hover { background:#22223a; color:#aaaaee; border-color:#4444aa; }
    #btnStart  { background:linear-gradient(135deg,#4f46e5,#7c3aed); color:#fff; }
    #btnStart:hover  { filter:brightness(1.15); transform:translateY(-1px); }
    #btnStart:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    #btnStop   { background:#1e0f0f; color:#f87171; border:1px solid #3a1a1a; }
    #btnStop:hover   { background:#2a1010; border-color:#f87171; }
    #btnStop:disabled { opacity:.3; cursor:not-allowed; }
    .footer { padding:10px 16px; border-top:1px solid #1e1e2e; font-size:10px; color:#3a3a5c; font-family:'Space Mono',monospace; text-align:center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎓</div>
    <div>
      <div class="title">IELTS TRANSCRIPT</div>
      <div class="sub">Whisper · VI / EN · localhost:8765</div>
    </div>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">IDLE</div>
  </div>
  <div class="actions">
    <button id="btnWindow">⧉ Mở cửa sổ phụ đề</button>
    <button id="btnStart">▶ Bắt đầu ghi âm</button>
    <button id="btnStop" disabled>■ Dừng</button>
  </div>
  <div class="footer">backend phải chạy trước khi bấm Start</div>
  <script src="popup.js"></script>
</body>
</html>
