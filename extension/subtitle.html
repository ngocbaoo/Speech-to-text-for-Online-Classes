<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.88);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    .bar {
      flex-shrink: 0;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #818cf8, #a78bfa);
    }

    #scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 22px 6px;
      /* justify-content: flex-end đã bị xóa — nó chặn scroll */
    }

    #scroll-area::-webkit-scrollbar { width: 4px; }
    #scroll-area::-webkit-scrollbar-track { background: transparent; }
    #scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    #final-text {
      font-size: 19px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.93);
      line-height: 1.8;
      word-wrap: break-word;
      /* min-height đẩy text xuống dưới khi ít chữ */
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    #draft-text {
      flex-shrink: 0;
      padding: 4px 22px 12px;
      font-size: 15px;
      font-weight: 300;
      font-style: italic;
      color: rgba(251, 191, 36, 0.7);
      min-height: 26px;
      word-wrap: break-word;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .word {
      display: inline;
      opacity: 0;
      animation: fw 0.2s forwards;
    }

    @keyframes fw {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .waiting {
      font-size: 12px;
      color: #333355;
      font-family: monospace;
      letter-spacing: 2px;
      animation: blink 1.5s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
  <div class="bar"></div>
  <div id="scroll-area">
    <div id="final-text"><span class="waiting">WAITING FOR AUDIO...</span></div>
  </div>
  <div id="draft-text"></div>
  <script src="subtitle.js"></script>
</body>
</html>
